<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil — Highly Podcast</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --accent-glow: rgba(99,102,241,0.3);
  }

  body.theme-dark {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24;
    --border: rgba(255,255,255,0.07); --text: #f0f0f8;
    --text2: #9090b0; --text3: #5a5a78;
    --card-bg: #13131d; --card-hover: #1c1c2a;
    --nav-bg: rgba(10,10,15,0.85); --tag-bg: rgba(99,102,241,0.12);
  }
  body.theme-glass {
    --bg: #0d0d1a; --bg2: rgba(255,255,255,0.03); --bg3: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.1); --text: #ffffff;
    --text2: rgba(255,255,255,0.6); --text3: rgba(255,255,255,0.3);
    --card-bg: rgba(255,255,255,0.05); --card-hover: rgba(255,255,255,0.09);
    --nav-bg: rgba(13,13,26,0.7); --tag-bg: rgba(99,102,241,0.15);
  }
  body.theme-light {
    --bg: #f5f5fa; --bg2: #ededf5; --bg3: #e5e5f0;
    --border: rgba(0,0,0,0.08); --text: #0d0d1a;
    --text2: #5a5a78; --text3: #9090b0;
    --card-bg: #ffffff; --card-hover: #f0f0fa;
    --nav-bg: rgba(245,245,250,0.9); --tag-bg: rgba(99,102,241,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; transition: background 0.3s, color 0.3s;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: var(--nav-bg);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-left { display: flex; align-items: center; gap: 10px; }
  .nav-logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px;
    color: var(--text); text-decoration: none;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-logo .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }
  .nav-badge {
    font-size: 11px; font-weight: 500; color: var(--text3);
    background: var(--bg3); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 20px; letter-spacing: .5px;
  }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .theme-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all .2s;
  }
  .theme-btn:hover { background: var(--card-hover); color: var(--text); }
  .dashboard-btn {
    height: 34px; padding: 0 16px; border-radius: 8px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; text-decoration: none;
    display: flex; align-items: center; gap: 6px; transition: opacity .2s;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .dashboard-btn:hover { opacity: .85; }

  /* ── LOADING ── */
  #loading-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 999;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; transition: opacity .4s;
  }
  #loading-screen .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }

  /* ── MAIN ── */
  main { padding-top: 60px; }
  .page-wrap {
    max-width: 860px; margin: 0 auto; padding: 48px 24px 80px;
  }

  /* ── PROFILE HERO ── */
  .profile-hero {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 24px; padding: 40px 36px;
    display: flex; align-items: center; gap: 32px;
    margin-bottom: 40px;
    position: relative; overflow: hidden;
  }
  .profile-hero::before {
    content: '';
    position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, var(--accent-glow), transparent 70%);
    pointer-events: none;
  }
  .profile-avatar-big {
    width: 96px; height: 96px; border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; flex-shrink: 0;
    border: 2px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .profile-info { flex: 1; min-width: 0; }
  .profile-username {
    font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800;
    color: var(--text); margin-bottom: 6px;
  }
  .profile-email {
    font-size: 14px; color: var(--text3); margin-bottom: 16px;
  }
  .profile-stats {
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .stat-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; color: var(--text2);
  }
  .stat-chip strong { color: var(--accent); font-weight: 700; }

  /* ── NOT LOGGED IN ── */
  #gate-wrap {
    display: none;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 24px; padding: 64px 32px; text-align: center;
    margin-bottom: 32px;
  }
  #gate-wrap .gate-icon { font-size: 56px; margin-bottom: 20px; }
  #gate-wrap h2 {
    font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
    color: var(--text); margin-bottom: 10px;
  }
  #gate-wrap p { font-size: 14px; color: var(--text2); margin-bottom: 28px; line-height: 1.6; }
  .gate-login-btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 46px; padding: 0 28px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer;
    text-decoration: none; transition: opacity .2s;
    box-shadow: 0 6px 24px var(--accent-glow);
  }
  .gate-login-btn:hover { opacity: .85; }

  /* ── LIKED EPISODES SECTION ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
    color: var(--text); display: flex; align-items: center; gap: 10px;
  }
  .section-count {
    font-size: 13px; color: var(--text3); font-weight: 400;
    background: var(--bg3); border: 1px solid var(--border);
    padding: 2px 10px; border-radius: 20px;
  }

  /* ── EPISODE ROW ── */
  .episode-row {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer; text-decoration: none; color: inherit;
    transition: background .2s, transform .2s; margin-bottom: 12px;
  }
  .episode-row:hover { background: var(--card-hover); transform: translateX(4px); }
  .ep-thumb {
    width: 56px; height: 56px; border-radius: 10px;
    object-fit: cover; flex-shrink: 0;
  }
  .ep-thumb-ph {
    width: 56px; height: 56px; border-radius: 10px;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 24px;
  }
  .ep-info { flex: 1; min-width: 0; }
  .ep-series-lbl {
    font-size: 11px; color: var(--accent); font-weight: 500;
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px;
  }
  .ep-name {
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
    color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ep-dur { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .ep-play-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; box-shadow: 0 4px 14px var(--accent-glow);
  }
  .ep-play-icon svg { width: 14px; height: 14px; fill: white; margin-left: 1px; }
  .ep-like-badge {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(239,68,68,.12); flex-shrink: 0;
    font-size: 14px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 56px 32px; text-align: center;
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 {
    font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
    color: var(--text); margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; color: var(--text2); line-height: 1.6; }
  .browse-btn {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 20px; height: 40px; padding: 0 20px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text2); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; text-decoration: none;
    transition: all .2s;
  }
  .browse-btn:hover { background: var(--card-hover); color: var(--text); }

  /* SKELETON */
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--card-hover) 50%, var(--bg3) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* TOAST */
  #toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(24px);
    background: var(--card-bg); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; font-weight: 500;
    padding: 10px 20px; border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
    opacity: 0; pointer-events: none; z-index: 500;
    transition: opacity .25s, transform .25s;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border); padding: 24px;
    text-align: center; color: var(--text3); font-size: 13px;
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* GRADIENTS */
  .grad-1{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
  .grad-2{background:linear-gradient(135deg,#ec4899,#f43f5e)}
  .grad-3{background:linear-gradient(135deg,#14b8a6,#06b6d4)}
  .grad-4{background:linear-gradient(135deg,#f59e0b,#ef4444)}
  .grad-5{background:linear-gradient(135deg,#10b981,#3b82f6)}
  .grad-6{background:linear-gradient(135deg,#a855f7,#ec4899)}

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .profile-hero { flex-direction: column; text-align: center; padding: 28px 20px; }
    .profile-stats { justify-content: center; }
    .page-wrap { padding: 32px 16px 64px; }
  }
</style>
</head>
<body class="theme-dark">

<!-- LOADING -->
<div id="loading-screen">
  <div class="logo">🎙️ Highly Podcast</div>
  <div class="spinner"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo">
      <div class="dot"></div>
      Highly Podcast
    </a>
    <span class="nav-badge">BETA</span>
  </div>
  <div class="nav-right">
    <button class="theme-btn" onclick="cycleTheme()" title="Tema degistir" id="theme-icon">🌙</button>
    <a href="https://highly.com.tr" class="dashboard-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>
  </div>
</nav>

<main>
<div class="page-wrap">

  <!-- GATE (giris yapilmamissa) -->
  <div id="gate-wrap">
    <div class="gate-icon">👤</div>
    <h2>Profilinizi görün</h2>
    <p>Beğendiğiniz bölümleri görmek için Highly hesabınıza giriş yapın.</p>
    <a href="giris.html" class="gate-login-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>

    </a>
  </div>

  <!-- PROFILE HERO -->
  <div class="profile-hero" id="profile-hero" style="display:none;">
    <div class="profile-avatar-big" id="profile-avatar" style="background:var(--bg3)">👤</div>
    <div class="profile-info">
      <div class="profile-username" id="profile-username">Yükleniyor…</div>

        </div>

  <!-- LIKED EPISODES -->
  <div id="liked-section" style="display:none;">
    <div class="section-header">
      <div class="section-title">
        ❤️ Beğenilen Bölümler
        <span class="section-count" id="liked-count">0 bölüm</span>
      </div>

  </div>

</div>
</main>

<footer>
  <p>© 2025 Highly · <a href="mailto:infoandhelphighly@gmail.com">İletişim</a></p>
</footer>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SUPABASE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _sb = supabase.createClient(
  'https://ttuxfivcwdpyvhmybbna.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0dXhmaXZjd2RweXZobXliYm5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI0MDgxNjIsImV4cCI6MjA1Nzk4NDE2Mn0.GY0pDEOOYMPdEiPzMd1NHPE40EVPZW4ka7i-2RfABHk'
);

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TEMA
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var themes = ['dark', 'glass', 'light'];
var themeIcons = { dark: '🌙', glass: '✨', light: '☀️' };

function applyTheme(t) {
  document.body.className = 'theme-' + t;
  var btn = document.getElementById('theme-icon');
  if (btn) btn.textContent = themeIcons[t] || '🌙';
}
(function() {
  var saved = localStorage.getItem('highly_theme') || 'dark';
  applyTheme(saved);
})();
function cycleTheme() {
  var cur = localStorage.getItem('highly_theme') || 'dark';
  var idx = themes.indexOf(cur);
  var next = themes[(idx + 1) % themes.length];
  localStorage.setItem('highly_theme', next);
  applyTheme(next);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOAST
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _toastTimer = null;
function toast(msg, dur) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('show'); }, dur || 2500);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function fmtDur(s) {
  if (!s) return '';
  var m = Math.floor(s / 60);
  var sec = s % 60;
  return m + ':' + (sec < 10 ? '0' : '') + sec + ' dk';
}
function fmtDate(d) {
  if (!d) return '';
  var dt = new Date(d);
  return dt.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', year: 'numeric' });
}
var gradClasses = ['grad-1','grad-2','grad-3','grad-4','grad-5','grad-6'];
function gradClass(i) { return gradClasses[i % gradClasses.length]; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   AUTH + PROFIL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function init() {
  try {
    var sessionResp = await _sb.auth.getSession();
    var session = sessionResp.data && sessionResp.data.session;

    if (!session) {
      // Giris yapilmamis
      document.getElementById('gate-wrap').style.display = 'block';
      return;
    }

    // Kullanici bilgileri
    var userResp = await _sb.from('users')
      .select('id, name, username, avatarEmoji, avatarBg, email')
      .eq('email', session.user.email)
      .single();

    var u = userResp.data;
    if (!u) {
      document.getElementById('gate-wrap').style.display = 'block';
      return;
    }

    // Avatar + bilgileri goster
    var avatarEl = document.getElementById('profile-avatar');
    avatarEl.textContent = u.avatarEmoji || '👤';
    avatarEl.style.background = u.avatarBg || 'var(--bg3)';

    document.getElementById('profile-username').textContent = '@' + (u.username || u.name || 'kullanici');
    document.getElementById('profile-email').textContent = u.email || '';
    document.getElementById('profile-hero').style.display = 'flex';

    // Begenilen bolumler
    await loadLikedEpisodes(u.id);

  } catch(e) {
    console.error(e);
    toast('Bir hata olustu.');
  } finally {
    var ls = document.getElementById('loading-screen');
    ls.classList.add('hidden');
    setTimeout(function() { ls.remove(); }, 500);
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BEGENILEN BOLUMLER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function loadLikedEpisodes(userId) {
  // episode_likes tablosundan kullanicinin begeniklerini cek
  var likesResp = await _sb
    .from('episode_likes')
    .select('episode_id, created_at')
    .eq('user_id', userId)
    .order('created_at', { ascending: false });

  var likes = likesResp.data || [];

  // Stat guncelle
  document.getElementById('stat-likes').textContent = likes.length;

  var likedSection = document.getElementById('liked-section');
  var likedList = document.getElementById('liked-list');
  var likedCount = document.getElementById('liked-count');

  likedCount.textContent = likes.length + ' bolum';
  likedSection.style.display = 'block';

  if (likes.length === 0) {
    likedList.innerHTML = '<div class="empty-state">'
      + '<div class="empty-icon">\u2764\uFE0F</div>'
      + '<h3>Henuz begeni yok</h3>'
      + '<p>Bolumleri dinleyip begendiklerinizi burada gorebilirsiniz.</p>'
      + '<a href="index.html" class="browse-btn">\uD83C\uDFA7 Bolumleri Kes&sect;fe Et</a>'
      + '</div>';
    return;
  }

  // Episode ID'lerini topla
  var epIds = likes.map(function(l) { return l.episode_id; });

  // Bolum detaylarini cek
  var epsResp = await _sb
    .from('podcast_episodes')
    .select('id, title, cover_url, duration_seconds, created_at, podcast_series(id, title)')
    .in('id', epIds);

  var eps = epsResp.data || [];

  // Begeni sirasina gore sirala
  var epsMap = {};
  eps.forEach(function(ep) { epsMap[ep.id] = ep; });

  var html = '';
  likes.forEach(function(like, i) {
    var ep = epsMap[like.episode_id];
    if (!ep) return;

    var seriesTitle = ep.podcast_series ? ep.podcast_series.title : '';
    var thumb = ep.cover_url
      ? '<img class="ep-thumb" src="' + ep.cover_url + '" alt="' + ep.title + '">'
      : '<div class="ep-thumb-ph ' + gradClass(i) + '">\uD83C\uDFB5</div>';

    html += '<a href="bolum.html?id=' + ep.id + '" class="episode-row">'
      + thumb
      + '<div class="ep-info">'
      + (seriesTitle ? '<div class="ep-series-lbl">' + seriesTitle + '</div>' : '')
      + '<div class="ep-name">' + ep.title + '</div>'
      + '<div class="ep-dur">'
      + (ep.duration_seconds ? fmtDur(ep.duration_seconds) + ' &middot; ' : '')
      + fmtDate(ep.created_at)
      + '</div>'
      + '</div>'
      + '<div class="ep-like-badge">\u2764\uFE0F</div>'
      + '<div class="ep-play-icon">'
      + '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>'
      + '</div>'
      + '</a>';
  });

  likedList.innerHTML = html || '<div class="empty-state"><div class="empty-icon">\u26A0\uFE0F</div><h3>Yuklenemedi</h3><p>Bolum bilgileri alinamadi.</p></div>';
}

init();
</script>
</body>
</html>
