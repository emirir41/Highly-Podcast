<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seri — Highly Podcast</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --accent-glow: rgba(99,102,241,0.3);
  }

  body.theme-dark {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f8;
    --text2: #9090b0;
    --text3: #5a5a78;
    --card-bg: #13131d;
    --card-hover: #1c1c2a;
    --nav-bg: rgba(10,10,15,0.85);
    --tag-bg: rgba(99,102,241,0.12);
  }

  body.theme-glass {
    --bg: #0d0d1a;
    --bg2: rgba(255,255,255,0.03);
    --bg3: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.1);
    --text: #ffffff;
    --text2: rgba(255,255,255,0.6);
    --text3: rgba(255,255,255,0.3);
    --card-bg: rgba(255,255,255,0.05);
    --card-hover: rgba(255,255,255,0.09);
    --nav-bg: rgba(13,13,26,0.7);
    --tag-bg: rgba(99,102,241,0.15);
  }

  body.theme-light {
    --bg: #f5f5fa;
    --bg2: #ededf5;
    --bg3: #e5e5f0;
    --border: rgba(0,0,0,0.08);
    --text: #0d0d1a;
    --text2: #5a5a78;
    --text3: #9090b0;
    --card-bg: #ffffff;
    --card-hover: #f0f0fa;
    --nav-bg: rgba(245,245,250,0.9);
    --tag-bg: rgba(99,102,241,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-left { display: flex; align-items: center; gap: 10px; }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-logo .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(0.85); }
  }

  .back-btn {
    height: 34px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .back-btn:hover { background: var(--card-hover); color: var(--text); }

  .nav-right { display: flex; align-items: center; gap: 10px; }

  .theme-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .theme-btn:hover { background: var(--card-hover); color: var(--text); }

  .home-btn {
    height: 34px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }

  .home-btn:hover { background: var(--card-hover); color: var(--text); }

  .avatar-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    text-decoration: none;
    transition: all 0.2s;
  }

  .avatar-btn:hover { background: var(--card-hover); }

  .login-btn {
    height: 34px;
    padding: 0 16px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    display: flex; align-items: center;
    transition: opacity 0.2s;
  }

  .login-btn:hover { opacity: 0.85; }

  /* MAIN */
  main { padding-top: 60px; }

  /* HERO BANNER */
  .series-hero {
    position: relative;
    overflow: hidden;
  }

  .series-hero-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    opacity: 0.12;
  }

  .series-hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(40px) saturate(1.5);
    opacity: 0.3;
  }

  .series-hero-content {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px 40px;
    display: flex;
    gap: 36px;
    align-items: flex-start;
  }

  .series-cover-wrap {
    flex-shrink: 0;
  }

  .series-cover-img {
    width: 180px;
    height: 180px;
    border-radius: 16px;
    object-fit: cover;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }

  .series-cover-placeholder {
    width: 180px;
    height: 180px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .series-info { flex: 1; min-width: 0; }

  .series-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--tag-bg);
    border: 1px solid rgba(99,102,241,0.2);
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  .series-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 4vw, 40px);
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .series-desc {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.6;
    max-width: 560px;
    margin-bottom: 20px;
  }

  .series-meta-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .meta-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text3);
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 20px;
  }

  .lock-notice {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--accent);
    margin-top: 16px;
  }

  .lock-notice a {
    color: white;
    background: var(--accent);
    padding: 3px 10px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 500;
    font-size: 12px;
    margin-left: 4px;
  }

  /* EPISODES SECTION */
  .section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 64px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .ep-count-badge {
    font-size: 12px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* SORT */
  .sort-btn {
    height: 30px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
  }

  .sort-btn:hover { background: var(--card-hover); color: var(--text); }

  /* EPISODE LIST */
  .episodes-list { display: flex; flex-direction: column; gap: 10px; }

  .episode-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s, transform 0.2s, border-color 0.2s;
  }

  .episode-item:hover {
    background: var(--card-hover);
    transform: translateX(4px);
    border-color: rgba(99,102,241,0.2);
  }

  .ep-num {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text3);
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .ep-cover {
    width: 52px; height: 52px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .ep-cover-placeholder {
    width: 52px; height: 52px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .ep-info { flex: 1; min-width: 0; }

  .ep-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 5px;
  }

  .ep-meta {
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ep-meta .dot { opacity: 0.4; }

  .ep-desc {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .ep-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .ep-duration {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
  }

  .ep-play {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px var(--accent-glow);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .episode-item:hover .ep-play {
    transform: scale(1.1);
    box-shadow: 0 6px 20px var(--accent-glow);
  }

  .ep-play svg { width: 14px; height: 14px; fill: white; margin-left: 2px; }

  .ep-locked {
    font-size: 16px;
    opacity: 0.5;
  }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text3);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 14px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* SKELETON */
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--card-hover) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ERROR */
  .error-page {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--text2);
  }

  .error-page .icon { font-size: 48px; }
  .error-page h2 { font-family: 'Syne', sans-serif; font-size: 22px; color: var(--text); }
  .error-page p { font-size: 14px; }
  .error-page a {
    margin-top: 8px;
    padding: 10px 20px;
    background: var(--accent);
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }

  /* LOADING */
  #loading-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    transition: opacity 0.4s;
  }

  #loading-screen .logo {
    font-family: 'Syne', sans-serif;
    font-size: 24px; font-weight: 800; color: var(--text);
  }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px; text-align: center;
    color: var(--text3); font-size: 13px;
  }

  footer a { color: var(--accent); text-decoration: none; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .series-hero-content { flex-direction: column; gap: 20px; padding: 32px 16px; }
    .series-cover-img, .series-cover-placeholder { width: 120px; height: 120px; font-size: 40px; }
    .series-title { font-size: 26px; }
    .section { padding: 32px 16px 48px; }
    .ep-num { display: none; }
    .ep-desc { display: none; }
  }

  .grad-1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .grad-2 { background: linear-gradient(135deg, #ec4899, #f43f5e); }
  .grad-3 { background: linear-gradient(135deg, #14b8a6, #06b6d4); }
  .grad-4 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
  .grad-5 { background: linear-gradient(135deg, #10b981, #3b82f6); }
  .grad-6 { background: linear-gradient(135deg, #a855f7, #ec4899); }
</style>
</head>
<body class="theme-dark">

<div id="loading-screen">
  <div class="logo">🎙️ Highly Podcast</div>
  <div class="spinner"></div>
</div>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo">
      <div class="dot"></div>
      Highly Podcast
    </a>
  </div>
  <div class="nav-right">
    <button class="theme-btn" onclick="cycleTheme()" id="theme-icon">🌙</button>
    <a href="https://highly.com.tr" class="home-btn" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      highly.com.tr
    </a>
    <div id="user-area">
      <a href="giris.html" class="login-btn">Giriş Yap</a>
    </div>
  </div>
</nav>

<main id="main-content">
  <!-- JS ile doldurulacak -->
</main>

<footer>
  <p>© 2025 <a href="https://highly.com.tr">Highly</a> · Podcast platformu</p>
</footer>

<script>
const SUPABASE_URL = 'https://ttuxfivcwdpyvhmybbna.supabase.co';
const SUPABASE_KEY = 'BURAYA_ANON_KEY';
var _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// TEMA
const themes = ['dark','glass','light'];
const themeIcons = { dark:'🌙', glass:'✨', light:'☀️' };

function getTheme() { return localStorage.getItem('highly_theme') || 'dark'; }
function applyTheme(t) {
  document.body.className = 'theme-' + t;
  document.getElementById('theme-icon').textContent = themeIcons[t];
}
function cycleTheme() {
  const cur = getTheme();
  const next = themes[(themes.indexOf(cur)+1) % themes.length];
  localStorage.setItem('highly_theme', next);
  applyTheme(next);
}
applyTheme(getTheme());

// HELPERS
function formatDuration(secs) {
  if (!secs) return '';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + 's ' + m + 'dk';
  return m + ' dk';
}

function formatDate(str) {
  if (!str) return '';
  return new Date(str).toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
}

function gradClass(i) { return 'grad-' + ((i % 6) + 1); }

// URL PARAM
function getParam(key) {
  return new URLSearchParams(window.location.search).get(key);
}

// AUTH
async function initAuth() {
  const { data: { session } } = await _sb.auth.getSession();
  const area = document.getElementById('user-area');
  if (session && session.user) {
    const { data: u } = await _sb.from('users').select('username,avatarEmoji,avatarBg').eq('email', session.user.email).single();
    if (u) {
      area.innerHTML = `<a href="profil.html" class="avatar-btn" title="${u.username}" style="background:${u.avatarBg||'var(--bg3)'}">${u.avatarEmoji||'👤'}</a>`;
    }
    return session;
  }
  return null;
}

// SORT
var sortOrder = 'desc'; // newest first

function toggleSort() {
  sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
  const btn = document.getElementById('sort-btn');
  btn.innerHTML = sortOrder === 'desc'
    ? '↓ En Yeni'
    : '↑ En Eski';
  renderEpisodes();
}

var allEpisodes = [];

function renderEpisodes() {
  const sorted = [...allEpisodes].sort((a, b) => {
    if (sortOrder === 'asc') return a.episode_number - b.episode_number;
    return b.episode_number - a.episode_number;
  });

  const list = document.getElementById('episodes-list');
  if (!sorted.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🎵</div><p>Bu seride henüz bölüm yok.</p></div>';
    return;
  }

  list.innerHTML = sorted.map((ep, i) => `
    <a href="bolum.html?id=${ep.id}" class="episode-item">
      <span class="ep-num">${ep.episode_number}</span>
      ${ep.cover_url
        ? `<img class="ep-cover" src="${ep.cover_url}" alt="${ep.title}">`
        : `<div class="ep-cover-placeholder ${gradClass(ep.episode_number)}">🎵</div>`
      }
      <div class="ep-info">
        <div class="ep-title">${ep.title}</div>
        <div class="ep-meta">
          <span>${formatDate(ep.created_at)}</span>
          ${ep.duration_seconds ? `<span class="dot">·</span><span>${formatDuration(ep.duration_seconds)}</span>` : ''}
        </div>
        ${ep.description ? `<div class="ep-desc">${ep.description}</div>` : ''}
      </div>
      <div class="ep-right">
        <span class="ep-duration">${formatDuration(ep.duration_seconds)}</span>
        <div class="ep-play">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
    </a>
  `).join('');
}

// ANA INIT
async function init() {
  const seriesId = getParam('id');

  if (!seriesId) {
    showError('Geçersiz seri.', 'Böyle bir seri bulunamadı.');
    return;
  }

  const session = await initAuth();

  // Seri bilgisi
  const { data: series, error } = await _sb
    .from('podcast_series')
    .select('*')
    .eq('id', seriesId)
    .single();

  if (error || !series) {
    showError('Seri bulunamadı.', 'Bu seri mevcut değil veya silinmiş.');
    return;
  }

  // Kilitli mi ve giriş yapmamış mı?
  const isLocked = !series.is_public && !session;

  // Bölümler
  const { data: episodes } = await _sb
    .from('podcast_episodes')
    .select('*')
    .eq('series_id', seriesId)
    .order('episode_number', { ascending: false });

  allEpisodes = episodes || [];

  // Sayfa başlığı
  document.title = series.title + ' — Highly Podcast';

  // Hero render
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="series-hero">
      <div class="series-hero-bg">
        ${series.cover_url ? `<img src="${series.cover_url}" alt="">` : ''}
      </div>
      <div class="series-hero-content">
        <div class="series-cover-wrap">
          ${series.cover_url
            ? `<img class="series-cover-img" src="${series.cover_url}" alt="${series.title}">`
            : `<div class="series-cover-placeholder grad-1">🎙️</div>`
          }
        </div>
        <div class="series-info">
          <div class="series-badge">🎙️ Podcast Serisi</div>
          <h1 class="series-title">${series.title}</h1>
          ${series.description ? `<p class="series-desc">${series.description}</p>` : ''}
          <div class="series-meta-row">
            <div class="meta-pill">🎵 ${allEpisodes.length} Bölüm</div>
            ${!series.is_public
              ? `<div class="meta-pill">🔒 Üyelere Özel</div>`
              : `<div class="meta-pill">🌐 Herkese Açık</div>`
            }
          </div>
          ${isLocked ? `
            <div class="lock-notice">
              🔒 Bu içeriği dinlemek için giriş yapman gerekiyor.
              <a href="giris.html">Giriş Yap</a>
            </div>
          ` : ''}
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="section-title">Bölümler</div>
          <span class="ep-count-badge">${allEpisodes.length} bölüm</span>
        </div>
        <button class="sort-btn" id="sort-btn" onclick="toggleSort()">↓ En Yeni</button>
      </div>
      <div class="episodes-list" id="episodes-list"></div>
    </div>
  `;

  renderEpisodes();

  // Kilitli serinin bölümlerine tıklamayı engelle
  if (isLocked) {
    setTimeout(() => {
      document.querySelectorAll('.episode-item').forEach(el => {
        el.addEventListener('click', e => {
          e.preventDefault();
          window.location.href = 'giris.html';
        });
      });
    }, 100);
  }

  // Loading kaldır
  const ls = document.getElementById('loading-screen');
  ls.classList.add('hidden');
  setTimeout(() => ls.remove(), 500);
}

function showError(title, desc) {
  document.getElementById('main-content').innerHTML = `
    <div class="error-page">
      <div class="icon">😕</div>
      <h2>${title}</h2>
      <p>${desc}</p>
      <a href="index.html">Ana Sayfaya Dön</a>
    </div>
  `;
  const ls = document.getElementById('loading-screen');
  ls.classList.add('hidden');
  setTimeout(() => ls.remove(), 500);
}

init();
</script>
</body>
</html>
